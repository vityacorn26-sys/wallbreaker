<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WallBreaker — Proxy Game</title>
  <script src="https://telegram.org"></script>
  <style>
    body { background: #000; color: #00ffcc; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; user-select: none; }
    
    /* Слой живого фона */
    #bg-layer {
      position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
      background: url('cat1.jpg') no-repeat center center;
      background-size: cover;
      opacity: 0.3; /* Чтобы не мешал тапать, но был виден */
      z-index: -1;
      animation: breath 8s infinite ease-in-out;
    }

    @keyframes breath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 { color: #ff00aa; text-shadow: 0 0 15px #ff00aa; font-size: 22px; margin: 5px; position: relative; }
    
    #cat-container { 
      width: 240px; height: 300px; margin: 15px auto; position: relative; 
      border: 4px solid #ff00aa; border-radius: 20px; overflow: hidden; 
      box-shadow: 0 0 30px #ff00aa; background: #000;
      touch-action: none;
    }
    #cat-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.05s; }
    
    #coins { font-size: 48px; font-weight: bold; text-shadow: 0 0 20px #00ffcc; margin: 5px; }
    
    .stats { background: rgba(0, 0, 0, 0.7); border: 1px solid #00ffcc; border-radius: 15px; padding: 10px; margin: 10px; }
    #energy-bar { width: 100%; height: 14px; background: #222; border-radius: 7px; margin-top: 5px; overflow: hidden; }
    #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff00aa, #00ffcc); transition: width 0.3s; }

    /* Ссылка-сервер в углу */
    #sponsor {
      position: fixed; bottom: 15px; left: 15px; width: 70px; text-align: center;
      font-size: 10px; color: #00ffcc; text-decoration: none;
    }
    #sponsor img { width: 50px; filter: drop-shadow(0 0 10px #00ffcc); margin-bottom: 3px; }

    .shop { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .rank-card { background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 8px; border-radius: 12px; font-size: 12px; }
    .rank-card button { width: 100%; padding: 6px; margin-top: 5px; background: #ff00aa; color: #fff; border: none; border-radius: 7px; font-weight: bold; }
    .rank-card button:disabled { background: #333; color: #666; }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <h1>WallBreaker: <span id="rank-name">Newbie</span></h1>

  <div id="cat-container" onmousedown="tap(event)" ontouchstart="tap(event)">
    <img id="cat-img" src="cat1.jpg" alt="Cat">
  </div>

  <div id="coins">0 $WALL</div>

  <div class="stats">
    ⚡ Энергия: <span id="energy-val">100</span> / 100
    <div id="energy-bar"><div id="energy-fill"></div></div>
  </div>

  <div class="shop" id="shop"></div>

  <a id="sponsor" href="https://t.me">
    <img src="server.jpg" alt="VPN">
    <span>Private Proxy</span>
  </a>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    const ranks = [
      { name: "Newbie", cost: 0, mult: 10, img: "cat1.jpg" },
      { name: "Pro", cost: 100000, mult: 25, img: "cat2.jpg" },
      { name: "Punk", cost: 300000, mult: 60, img: "cat3.jpg" },
      { name: "Agent", cost: 800000, mult: 150, img: "cat4.jpg" },
      { name: "CyberGod", cost: 1500000, mult: 400, img: "cat5.jpg" }
    ];

    let state = {
      coins: parseInt(localStorage.getItem('w_coins')) || 0,
      rank: parseInt(localStorage.getItem('w_rank')) || 0,
      energy: parseInt(localStorage.getItem('w_energy')) || 100
    };

    const shopEl = document.getElementById('shop');
    ranks.forEach((r, i) => {
      if (i === 0) return;
      let card = document.createElement('div');
      card.className = 'rank-card';
      card.innerHTML = `<b>${r.name}</b><br>Cost: ${r.cost}<br><button onclick="buyRank(${i})" id="btn-${i}">BUY</button>`;
      shopEl.appendChild(card);
    });

    function tap(e) {
      if (e) e.preventDefault();
      if (state.energy <= 0) return;
      
      state.energy--;
      state.coins += ranks[state.rank].mult;
      
      const img = document.getElementById('cat-img');
      img.style.transform = "scale(0.9) rotate(2deg)";
      setTimeout(() => img.style.transform = "scale(1) rotate(0deg)", 50);
      
      if (tg) tg.HapticFeedback.impactOccurred('light');
      updateUI();
    }

    function updateUI() {
      document.getElementById('coins').textContent = Math.floor(state.coins) + ' $WALL';
      document.getElementById('energy-val').textContent = state.energy;
      document.getElementById('energy-fill').style.width = state.energy + '%';
      document.getElementById('rank-name').textContent = ranks[state.rank].name;
      document.getElementById('cat-img').src = ranks[state.rank].img;
      document.getElementById('bg-layer').style.backgroundImage = `url(${ranks[state.rank].img})`;

      ranks.forEach((r, i) => {
        if (i === 0) return;
        const btn = document.getElementById('btn-' + i);
        if (btn) {
          btn.disabled = (state.coins < r.cost || state.rank >= i);
          if (state.rank >= i) btn.textContent = "ACTIVE";
        }
      });

      localStorage.setItem('w_coins', state.coins);
      localStorage.setItem('w_rank', state.rank);
      localStorage.setItem('w_energy', state.energy);
    }

    function buyRank(id) {
      if (state.coins >= ranks[id].cost && state.rank < id) {
        state.coins -= ranks[id].cost;
        state.rank = id;
        updateUI();
        if (tg) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    setInterval(() => {
      if (state.energy < 100) {
        state.energy++;
        updateUI();
      }
    }, 50000);

    updateUI();
  </script>
</body>
</html>
