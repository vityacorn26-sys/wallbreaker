<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WallBreaker | Tap to Unblock ⚡</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <img src="assets/loading.jpg" alt="SYSTEM START...">
    </div>

    <div id="bg-layer" style="display:none;"></div>
    
    <div id="menu-btn" onclick="toggleMenu()" style="display:none;">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar">
        <div class="lang-selector">
            <span onclick="setLang('RU')" id="lang-ru" class="active-lang">RU</span>
            <span style="color: #444;">|</span>
            <span onclick="setLang('EN')" id="lang-en">EN</span>
        </div>
        
        <div class="menu-item highlight" onclick="buyRank3()" id="btn-rank">ROOT INJECTION: 0.5 TON</div>
        <div class="menu-item highlight" onclick="showAds()" id="btn-ads">ADS INJECTION (+1500)</div>
        <div class="menu-item" onclick="showRefs()" id="btn-refs">РЕФЕРАЛЫ / РАНГИ</div>
        <div class="menu-item" onclick="showLeaderboard()" id="btn-top">ЛЕДЕРБОРД (Топ-10)</div>
        <div class="menu-item" onclick="openMarket()" id="btn-market">ДАРКНЕТ-МАРКЕТ</div>
        <div class="menu-item" onclick="toggleMenu()" style="border-color:#ff00aa; color:#ff00aa; margin-top: auto; margin-bottom: 30px;" id="btn-close">ЗАКРЫТЬ</div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="balance">
            <span id="balance-val">0</span> $WBC
        </div>

        <div id="cat-box" onclick="handleTap()">
            <img id="cat-img" src="assets/cat1.jpg" alt="Breaker">
        </div>

        <div class="energy-container">
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
            <div id="energy-text">ЭНЕРГИЯ</div>
        </div>

        <div id="gateway" onclick="openMarket()">
            <img src="assets/server.jpg" alt="Gateway">
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
