<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WallBreaker — Chrome Edition</title>
  <script src="https://telegram.org"></script>
  <style>
    body { background: #000; color: #00ffcc; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    
    /* Живой фон */
    #bg-layer {
      position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
      background: url('cat1.jpg') no-repeat center center; background-size: cover;
      opacity: 0.25; z-index: -1; animation: breath 10s infinite ease-in-out;
    }
    @keyframes breath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    /* Хромированный Гамбургер */
    #menu-btn { 
      position: fixed; top: 15px; right: 15px; font-size: 32px; cursor: pointer; z-index: 100;
      background: linear-gradient(135deg, #f5f7fa 0%, #b8bac1 20%, #7d7e8d 40%, #b8bac1 60%, #f5f7fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
    }

    /* Хромированная Шторка Маркета */
    #market {
      position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
      /* Эффект зеркального металла с прозрачностью */
      background: linear-gradient(135deg, rgba(184,186,193,0.3) 0%, rgba(125,126,141,0.4) 50%, rgba(184,186,193,0.3) 100%);
      backdrop-filter: blur(15px); /* Размытие фона сквозь шторку */
      -webkit-backdrop-filter: blur(15px);
      border-left: 2px solid rgba(255,255,255,0.4);
      z-index: 200; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
      padding: 20px; box-sizing: border-box; overflow-y: auto;
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    #market.open { right: 0; }
    #market h2 { 
      background: linear-gradient(90deg, #fff, #b8bac1, #fff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
    }

    /* Ранги в Маркете */
    .rank-card { 
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); 
      margin: 15px 0; padding: 12px; border-radius: 12px; text-align: left; 
    }
    .details { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.4; }
    .buy-btn { 
      width: 100%; padding: 10px; margin-top: 10px; font-weight: bold; border: none; border-radius: 8px;
      background: linear-gradient(180deg, #f5f7fa 0%, #7d7e8d 100%); color: #000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .buy-btn:disabled { opacity: 0.3; filter: grayscale(1); }

    /* Основной интерфейс */
    #main-ui { padding-top: 50px; }
    #cat-container { 
      width: 260px; height: 320px; margin: 0 auto; position: relative; 
      border: 4px solid #ff00aa; border-radius: 20px; overflow: hidden; 
      box-shadow: 0 0 30px #ff00aa; background: #000;
    }
    #cat-img { width: 100%; height: 100%; object-fit: cover; }
    #coins { font-size: 52px; font-weight: bold; text-shadow: 0 0 20px #00ffcc; margin: 15px 0; }
    
    .stats { background: rgba(0,0,0,0.6); border: 1px solid #00ffcc; border-radius: 15px; padding: 12px; margin: 0 20px; }
    #energy-bar { width: 100%; height: 14px; background: #222; border-radius: 7px; margin-top: 5px; overflow: hidden; }
    #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff00aa, #00ffcc); transition: width 0.3s; }

    /* Спонсор */
    #sponsor { position: fixed; bottom: 15px; left: 15px; width: 60px; text-decoration: none; font-size: 9px; color: #00ffcc; opacity: 0.8; }
    #sponsor img { width: 45px; filter: drop-shadow(0 0 10px #00ffcc); }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="menu-btn" onclick="toggleMarket()">☰</div>

  <div id="market">
    <div onclick="toggleMarket()" style="text-align:right; font-size:30px; color:#fff;">✕</div>
    <h2>Darknet Market</h2>
    <p style="font-size:11px; color:#aaa;">Select your clearance level, runner...</p>
    <div id="shop-list"></div>
  </div>

  <div id="main-ui">
    <div style="font-size:14px; color:#ff00aa; text-transform:uppercase;">Clearance: <span id="rank-name">Newbie</span></div>
    
    <div id="cat-container" onmousedown="tap(event)" ontouchstart="tap(event)">
      <img id="cat-img" src="cat1.jpg">
    </div>

    <div id="coins">0 $WALL</div>

    <div class="stats">
      ⚡ Energy: <span id="energy-val">100</span> / 100
      <div id="energy-bar"><div id="energy-fill"></div></div>
    </div>
  </div>

  <a id="sponsor" href="https://t.me/hiddifyProxySale_bot">
    <img src="server.jpg">
    <span>Private Proxy</span>
  </a>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    const ranks = [
      { name: "Newbie", cost: 0, mult: 10, img: "cat1.jpg", desc: "Level 1. Basic bypass. Standard speed." },
      { name: "Pro", cost: 100000, mult: 25, img: "cat2.jpg", desc: "Level 2. Deep encryption. Stable tunnel." },
      { name: "Punk", cost: 300000, mult: 60, img: "cat3.jpg", desc: "Level 3. DPI Firewall breaker. High speed." },
      { name: "Agent", cost: 800000, mult: 150, img: "cat4.jpg", desc: "Level 4. Elite nodes. Global access." },
      { name: "CyberGod", cost: 1500000, mult: 400, img: "cat5.jpg", desc: "Level 5. Invisible. Absolute freedom." }
    ];

    let state = {
      coins: parseInt(localStorage.getItem('w_coins')) || 0,
      rank: parseInt(localStorage.getItem('w_rank')) || 0,
      energy: parseInt(localStorage.getItem('w_energy')) || 100
    };

    function toggleMarket() { document.getElementById('market').classList.toggle('open'); }

    const shopList = document.getElementById('shop-list');
    ranks.forEach((r, i) => {
      if (i === 0) return;
      let card = document.createElement('div');
      card.className = 'rank-card';
      card.innerHTML = `<b>${r.name}</b> <span style="float:right; color:#ffff00;">${r.cost}</span>
        <div class="details">${r.desc} <br>Tap: +${r.mult} $WALL</div>
        <button class="buy-btn" id="btn-${i}" onclick="confirmBuy(${i})">PURCHASE</button>`;
      shopList.appendChild(card);
    });

    function tap(e) {
      if (e) e.preventDefault();
      if (state.energy <= 0) return;
      state.energy--; state.coins += ranks[state.rank].mult;
      document.getElementById('cat-img').style.transform = "scale(0.92)";
      setTimeout(()=> document.getElementById('cat-img').style.transform = "scale(1)", 50);
      if (tg) tg.HapticFeedback.impactOccurred('light');
      updateUI();
    }

    function confirmBuy(id) {
      if (state.coins < ranks[id].cost) { alert("Insufficient $WALL tokens."); return; }
      if (confirm(`Authorize purchase: ${ranks[id].name}?\nPrice: ${ranks[id].cost} $WALL.`)) {
        state.coins -= ranks[id].cost; state.rank = id;
        toggleMarket(); updateUI();
        if (tg) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function updateUI() {
      document.getElementById('coins').textContent = Math.floor(state.coins) + ' $WALL';
      document.getElementById('energy-val').textContent = state.energy;
      document.getElementById('energy-fill').style.width = state.energy + '%';
      document.getElementById('rank-name').textContent = ranks[state.rank].name;
      document.getElementById('cat-img').src = ranks[state.rank].img;
      document.getElementById('bg-layer').style.backgroundImage = `url(${ranks[state.rank].img})`;

      ranks.forEach((r, i) => {
        if (i === 0) return;
        const btn = document.getElementById('btn-' + i);
        if (btn) {
          btn.disabled = (state.rank >= i);
          if (state.rank >= i) { btn.textContent = "OWNED"; btn.style.background = "#444"; }
        }
      });
      localStorage.setItem('w_coins', state.coins);
      localStorage.setItem('w_rank', state.rank);
      localStorage.setItem('w_energy', state.energy);
    }

    setInterval(() => { if (state.energy < 100) { state.energy++; updateUI(); } }, 50000);
    updateUI();
  </script>
</body>
</html>
