<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WallBreaker | Tap to Unblock</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <img src="assets/loading.jpg" alt="LOADING..." style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <div id="bg-layer"></div>
    
    <div id="menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar">
        <div class="menu-item highlight" onclick="buyRank3()">ROOT INJECTION: 0.5 TON</div>
        <div class="menu-item" onclick="showAds()">СМОТРЕТЬ РЕКЛАМУ (+1000)</div>
        <div class="menu-item" onclick="window.open('https://t.me/hiddifyProxySale_bot')">МАРКЕТ</div>
        <div class="menu-item" onclick="toggleMenu()" style="border-color:#ff00aa; color:#ff00aa; margin-top: auto; margin-bottom: 30px;">ЗАКРЫТЬ</div>
    </div>

    <div id="game-ui">
        <div id="balance"><span id="balance-val">0</span> $WBC</div>

        <div id="cat-box" onclick="handleTap()">
            <img id="cat-img" src="assets/cat1.jpg" alt="Breaker">
        </div>

        <div class="energy-container">
            <div class="energy-bar"><div id="energy-fill"></div></div>
            <div id="energy-text">ЭНЕРГИЯ</div>
        </div>

        <div id="gateway" onclick="window.open('https://t.me/hiddifyProxySale_bot')">
            <img src="assets/server.jpg" alt="Gateway">
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
