<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WallBreaker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <img src="assets/loading.jpg" alt="SYSTEM START...">
    </div>

    <div id="bg-layer"></div>
    
    <div id="lang-switch" onclick="toggleLang()">RU / EN</div>

    <div id="menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar">
        <div class="menu-item highlight" onclick="buyRank3()" id="btn-rank">ROOT INJECTION: 0.5 TON</div>
        <div class="menu-item highlight" onclick="showAds()" id="btn-ads">ADS INJECTION (+1500)</div>
        <div class="menu-item" onclick="showReferrals()" id="btn-refs">REFS / РАНГИ</div>
        <div class="menu-item" onclick="showLeaderboard()" id="btn-top">LEADERBOARD</div>
        <div class="menu-item" onclick="openMarket()" id="btn-market">DARKNET MARKET</div>
        <div class="menu-item" onclick="toggleMenu()" style="color:#ff00aa;" id="btn-close">ЗАКРЫТЬ</div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="balance"><span id="balance-val">0</span> $WBC</div>
        <div id="cat-box" onclick="handleTap()">
            <img id="cat-img" src="assets/cat1.jpg" alt="Breaker">
        </div>
        <div class="energy-container">
            <div class="energy-bar"><div id="energy-fill"></div></div>
            <div id="energy-text">ENERGY</div>
        </div>
        <div id="gateway" onclick="openMarket()">
            <img src="assets/server.jpg" alt="Gateway">
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
