<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WallBreaker | Bypass DPI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon-cyan: #0ff; --neon-magenta: #f0f; }
        body { background: #080018; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 2px solid var(--neon-cyan); }
        .stats { font-size: 1.1rem; color: var(--neon-cyan); font-weight: bold; }
        main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; }
        #wall-btn { width: 250px; height: 250px; border: 4px solid var(--neon-cyan); border-radius: 30px; box-shadow: 0 0 20px var(--neon-cyan); cursor: pointer; transition: 0.1s; }
        #wall-btn:active { transform: scale(0.95); }
        #wall-btn img { width: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 20px;" onclick="location.reload()">🔄</div>
        <div class="stats">💰 <span id="balance">0</span> | ⚡️ <span id="energy">0</span></div>
    </header>

    <main>
        <h2 style="color:var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta);">BYPASS DPI</h2>
        <div id="wall-btn" onclick="handleTap()">
            <img src="cat.png" alt="Cat">
        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://api.setgot.qzz.io"; // Вшили адрес прямо сюда
        const userId = tg.initDataUnsafe?.user?.id || "test123";

        async function init() {
            try {
                const res = await fetch(`${API_URL}/api/user?id=${userId}`);
                const data = await res.json();
                updateUI(data.balance, data.energy);
            } catch (e) { console.error("Load error", e); }
        }

        async function handleTap() {
            try {
                const res = await fetch(`${API_URL}/api/tap?id=${userId}`);
                const data = await res.json();
                if (data.balance !== undefined) {
                    updateUI(data.balance, data.energy);
                    if (navigator.vibrate) navigator.vibrate(40);
                }
            } catch (e) { 
                if (tg.showAlert) tg.showAlert("Энергия закончилась!");
                else alert("Энергия на нуле!");
            }
        }

        function updateUI(b, e) {
            document.getElementById('balance').innerText = b || 0;
            document.getElementById('energy').innerText = e || 0;
        }

        init();
        tg.expand();
    </script>
</body>
</html>
