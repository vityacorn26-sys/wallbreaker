<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wall Breaker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org"></script>
    <script src="https://sad.adsgram.ai"></script>
</head>
<body>
    <!-- Заставка при загрузке -->
    <div id="loading-screen" style="position:fixed; inset:0; z-index:999; background:#000; display:flex; align-items:center; justify-content:center;">
        <img src="assets/loading.jpg" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <!-- Гамбургер -->
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <!-- Шторка меню -->
    <div id="side-menu" class="side-menu">
        <h2 style="color:#00f2ff;">WALL BREAKER</h2>
        <a href="#" class="menu-btn" onclick="showSection('referral')">Рефералы</a>
        <a href="#" class="menu-btn" onclick="showSection('tasks')">Задания</a>
        <div style="margin-top: 50px;">
            <p>W-Pass Premium: 0.5 TON</p>
            <a href="#" class="menu-btn" style="border-color:#ffcc00; color:#ffcc00;">КУПИТЬ ТИKET</a>
        </div>
    </div>

    <!-- Основная игра -->
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:space-around; height:100vh;">
        <img id="bg-cat" src="assets/cat1.jpg">
        <div id="balance" style="font-size:32px; font-weight:bold; color:#00f2ff; text-shadow:0 0 10px #00f2ff;">0 $WBC</div>
        <img id="tap-button" src="assets/cat1.jpg" class="tap-button" onclick="handleTap()">
        <div id="energy" style="font-size:18px; color:#fff;">Энергия: 100/100</div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
    <script>
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        // Скрываем загрузку через 2 секунды (пока для теста)
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000);
    </script>
</body>
</html>
