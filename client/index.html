<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WallBreaker | Tap to Unblock ⚡</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <img src="assets/loading.jpg" alt="SYSTEM START...">
    </div>

    <div id="bg-layer" style="display:none;"></div>
    
    <div id="menu-btn" onclick="toggleMenu()" style="display:none;">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar">
        <div class="lang-selector">
            <span id="lang-ru" class="active-lang" onclick="window.setLang('RU')">RU</span> |
            <span id="lang-en" onclick="window.setLang('EN')">EN</span>
        </div>
       
        <div class="menu-item ton-buy" id="btn-rank" onclick="window.openMarket()">ROOT INJECTION: 0.5 TON</div>
        <div class="menu-item highlight" id="btn-ads" onclick="window.showAds()">ADS INJECTION (+1500)</div>
       
        <div class="menu-item" id="btn-refs" onclick="window.showRefs()">РЕФЕРАЛЫ (10%)</div>
        <div class="menu-item" id="btn-top" onclick="window.showLeaderboard()">ЛИДЕРБОРД</div>
       
        <div class="menu-item" id="btn-market" onclick="window.openMarket()">ДАРКНЕТ-МАРКЕТ</div>
       
        <div class="menu-item" id="btn-close" style="margin-top: auto; border-color: #ff00aa;" onclick="window.toggleMenu()">ЗАКРЫТЬ</div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="balance">
            <span id="balance-val">0</span> $WBC
        </div>

        <div id="cat-box" onclick="handleTap()">
            <img id="cat-img" src="assets/cat1.jpg" alt="Breaker">
        </div>

        <div class="energy-container">
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
            <div id="energy-text">ЭНЕРГИЯ</div>
        </div>

        <div id="gateway" onclick="openMarket()">
            <img src="assets/server.jpg" alt="Gateway">
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
