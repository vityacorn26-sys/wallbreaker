<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WallBreaker — Final Elite</title>
  <script src="https://telegram.org"></script>
  <style>
    :root {
      --chrome: linear-gradient(135deg, #f5f7fa 0%, #b8bac1 20%, #7d7e8d 40%, #b8bac1 60%, #f5f7fa 100%);
      --neon-cyan: #00fff2;
      --neon-yellow: #fffb00;
      --glass: rgba(10, 10, 20, 0.6); /* Больше прозрачности */
    }
    body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    
    #bg-layer {
      position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
      background: url('cat1.jpg') no-repeat center center; background-size: cover;
      opacity: 0.35; z-index: -1; animation: breath 10s infinite ease-in-out; transition: background 0.5s;
    }
    @keyframes breath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    /* Хромированный Гамбургер */
    #menu-btn { 
      position: fixed; top: 20px; right: 20px; font-size: 35px; cursor: pointer; z-index: 800;
      background: var(--chrome); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
    }

    /* HUB MENU (Glassmorphism) */
    .overlay {
      position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 900; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .overlay.open { right: 0; }

    /* Кнопка закрытия внутри шторки */
    .close-btn { position: absolute; top: 20px; right: 25px; font-size: 35px; color: #fff; cursor: pointer; }

    .chrome-btn {
      width: 85%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2);
      background: var(--chrome); color: #000; font-weight: 800; text-transform: uppercase;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-size: 14px;
    }

    /* Маркет */
    #market-content { width: 90%; max-height: 80vh; overflow-y: auto; display: none; }
    .rank-card { 
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0,255,242,0.3); 
      margin: 12px 0; padding: 15px; border-radius: 15px; text-align: left;
    }
    .rank-name { color: var(--neon-cyan); font-weight: bold; font-size: 18px; text-shadow: 0 0 10px var(--neon-cyan); }
    .rank-price { color: var(--neon-yellow); float: right; font-weight: bold; }
    .rank-desc { font-size: 11px; color: #a0fffb; margin: 5px 0; line-height: 1.3; } /* Цвет описания изменен */

    /* Main UI */
    #main-ui { padding-top: 60px; }
    #cat-box { 
      width: 250px; height: 310px; margin: 0 auto; border: 3px solid #ff00aa; 
      border-radius: 20px; overflow: hidden; box-shadow: 0 0 35px #ff00aa;
    }
    #cat-img { width: 100%; height: 100%; object-fit: cover; }
    #coins { font-size: 56px; font-weight: 900; text-shadow: 0 0 20px #00ffcc; margin: 15px 0; color: #00ffcc; }
    
    .energy-box { background: rgba(0,0,0,0.5); border: 1px solid #00ffcc; border-radius: 15px; padding: 10px; margin: 0 30px; }
    #energy-bar { width: 100%; height: 12px; background: #111; border-radius: 6px; margin-top: 8px; border: 1px solid #333; overflow: hidden; }
    #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff00aa, #00ffcc); transition: width 0.3s; }

    #sponsor { position: fixed; bottom: 20px; left: 20px; text-decoration: none; display: flex; align-items: center; gap: 8px; z-index: 100; }
    #sponsor img { width: 45px; filter: drop-shadow(0 0 10px #00ffcc); }
    #sponsor span { font-size: 9px; color: #00ffcc; font-weight: bold; }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="menu-btn" onclick="toggleOverlay(true)">☰</div>

  <!-- HUB OVERLAY -->
  <div id="hub" class="overlay">
    <div class="close-btn" onclick="toggleOverlay(false)">✕</div>
    
    <div id="hub-main-buttons" style="width:100%;">
        <button class="chrome-btn" onclick="toggleLang()">EN / RU</button>
        <button class="chrome-btn" onclick="showMarket()">DarkNet Market</button>
        <button class="chrome-btn" onclick="watchAd()" style="background:var(--neon-yellow); color:#000;">⚡ <span id="ad-btn-txt">Get Energy (ADS)</span></button>
        <button class="chrome-btn" onclick="buyTicket()">🎟 <span id="ticket-btn-txt">Tickets (Lottery)</span></button>
    </div>

    <div id="market-content">
        <div onclick="hideMarket()" style="color:var(--neon-cyan); margin-bottom:20px; font-weight:bold; cursor:pointer;">← <span id="back-txt">BACK</span></div>
        <div id="shop-list"></div>
    </div>
  </div>

  <div id="main-ui">
    <div style="font-size:12px; color:#ff00aa; letter-spacing:2px; font-weight:bold;"><span id="clearance-txt">Clearance</span>: <span id="rank-name">Newbie</span></div>
    
    <div id="cat-box" onmousedown="tap(event)" ontouchstart="tap(event)">
      <img id="cat-img" src="cat1.jpg">
    </div>

    <div id="coins">0</div>

    <div class="energy-box">
      <span id="energy-txt">Energy</span>: <span id="energy-val">100</span> / 100
      <div id="energy-bar"><div id="energy-fill"></div></div>
    </div>
  </div>

  <a id="sponsor" href="tg://resolve?domain=hiddifyProxySale_bot">
    <img src="server.jpg">
    <span>Anonymous<br>Proxy</span>
  </a>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    let lang = localStorage.getItem('w_lang') || 'EN';
    const texts = {
      EN: { clearance: "Clearance", energy: "Energy", ad: "Get Energy (ADS)", ticket: "Tickets (Lottery)", back: "BACK", duration: "Duration: 7 Days", buy: "PURCHASE", owned: "OWNED" },
      RU: { clearance: "Доступ", energy: "Энергия", ad: "Энергия (РЕКЛАМА)", ticket: "Билеты (Лотерея)", back: "НАЗАД", duration: "Срок: 7 Дней", buy: "КУПИТЬ", owned: "КУПЛЕНО" }
    };

    const ranks = [
      { name: "Newbie", cost: 0, mult: 10, img: "cat1.jpg", descEN: "Standard tunnel.", descRU: "Обычный туннель." },
      { name: "Pro", cost: 100000, mult: 25, img: "cat2.jpg", descEN: "Encrypted node.", descRU: "Шифрованный узел." },
      { name: "Punk", cost: 300000, mult: 60, img: "cat3.jpg", descEN: "Bypass DPI v1.0.", descRU: "Обход DPI v1.0." },
      { name: "Agent", cost: 800000, mult: 150, img: "cat4.jpg", descEN: "Elite ghost proxy.", descRU: "Элитный прокси." },
      { name: "CyberGod", cost: 1500000, mult: 400, img: "cat5.jpg", descEN: "The Network God.", descRU: "Бог Сети." }
    ];

    let state = { 
        coins: parseInt(localStorage.getItem('w_coins')) || 0, 
        rank: parseInt(localStorage.getItem('w_rank')) || 0, 
        energy: parseInt(localStorage.getItem('w_energy')) || 100 
    };

    function toggleOverlay(open) { 
        document.getElementById('hub').classList.toggle('open', open); 
        if(!open) hideMarket();
    }
    function showMarket() { document.getElementById('hub-main-buttons').style.display = 'none'; document.getElementById('market-content').style.display = 'block'; }
    function hideMarket() { document.getElementById('hub-main-buttons').style.display = 'block'; document.getElementById('market-content').style.display = 'none'; }
    
    function toggleLang() { 
        lang = lang === 'EN' ? 'RU' : 'EN'; 
        localStorage.setItem('w_lang', lang); 
        updateUI(); 
    }

    const shopList = document.getElementById('shop-list');
    ranks.forEach((r, i) => {
      if (i === 0) return;
      let card = document.createElement('div');
      card.className = 'rank-card';
      card.innerHTML = `<span class="rank-name">${r.name}</span> <span class="rank-price">${r.cost}</span>
        <div class="rank-desc" id="desc-${i}">${lang === 'EN' ? r.descEN : r.descRU}<br><b class="dur-txt">${texts[lang].duration}</b></div>
        <button class="chrome-btn" style="width:100%; padding:8px; margin-top:10px;" id="btn-${i}" onclick="confirmBuy(${i})">${texts[lang].buy}</button>`;
      shopList.appendChild(card);
    });

    function tap(e) {
      if (e) e.preventDefault(); if (state.energy <= 0) return;
      state.energy--; state.coins += ranks[state.rank].mult;
      document.getElementById('cat-img').style.transform = "scale(0.94)";
      setTimeout(()=> document.getElementById('cat-img').style.transform = "scale(1)", 50);
      if (tg) tg.HapticFeedback.impactOccurred('light'); updateUI();
    }

    function confirmBuy(id) {
      if (state.coins < ranks[id].cost) { alert(lang === 'EN' ? "Low tokens!" : "Мало монет!"); return; }
      if (confirm(lang === 'EN' ? "Confirm purchase?" : "Подтвердить?")) {
        state.coins -= ranks[id].cost; state.rank = id;
        updateUI(); toggleOverlay(false);
      }
    }

    function buyTicket() {
      if (state.coins >= 2000000) { state.coins -= 2000000; alert("Success!"); updateUI(); }
      else { alert(lang === 'EN' ? "Need 2M $WALL" : "Нужно 2М монет"); }
    }

    function watchAd() { state.energy = 100; updateUI(); alert("Energy Full!"); }

    function updateUI() {
      const t = texts[lang];
      document.getElementById('coins').textContent = Math.floor(state.coins).toLocaleString();
      document.getElementById('energy-val').textContent = state.energy;
      document.getElementById('energy-fill').style.width = state.energy + '%';
      document.getElementById('rank-name').textContent = ranks[state.rank].name;
      document.getElementById('cat-img').src = ranks[state.rank].img;
      document.getElementById('bg-layer').style.backgroundImage = `url(${ranks[state.rank].img})`;
      
      // Перевод текстов
      document.getElementById('clearance-txt').textContent = t.clearance;
      document.getElementById('energy-txt').textContent = t.energy;
      document.getElementById('ad-btn-txt').textContent = t.ad;
      document.getElementById('ticket-btn-txt').textContent = t.ticket;
      document.getElementById('back-txt').textContent = t.back;

      ranks.forEach((r, i) => {
        if (i === 0) return;
        const btn = document.getElementById('btn-' + i);
        const desc = document.getElementById(`desc-${i}`);
        if (btn) {
            btn.disabled = (state.rank >= i);
            btn.textContent = state.rank >= i ? t.owned : t.buy;
            desc.innerHTML = `${lang === 'EN' ? r.descEN : r.descRU}<br><b>${t.duration}</b>`;
        }
      });
      localStorage.setItem('w_coins', state.coins);
      localStorage.setItem('w_rank', state.rank);
      localStorage.setItem('w_energy', state.energy);
    }

    setInterval(() => { if (state.energy < 100) { state.energy++; updateUI(); } }, 50000);
    updateUI();
  </script>
</body>
</html>
