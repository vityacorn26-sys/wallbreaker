<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WallBreaker — Bypass DPI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #050010; color: #00ffcc; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    
    /* ФОНОВЫЙ СЛОЙ — Синхронный с рангом */
    #background-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-size: cover; background-position: center;
        filter: blur(12px) brightness(25%); /* Затемняем, чтобы кот-кнопка выделялся */
        z-index: -1; transition: background-image 0.8s ease-in-out;
    }

    /* Меню "Жидкий Металл" */
    #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 100; width: 35px; height: 30px; background: linear-gradient(145deg, #aaa, #666); border-radius: 5px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-around; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    #menu-btn span { width: 100%; height: 3px; background: #222; border-radius: 2px; }
    #side-menu { position: fixed; top: 0; left: -100%; width: 66%; height: 100%; background: rgba(100, 100, 100, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-right: 2px solid rgba(200, 200, 200, 0.5); z-index: 99; transition: 0.5s ease-out; padding-top: 70px; text-align: left; }
    #side-menu a { display: block; padding: 15px 25px; color: #ddd; text-decoration: none; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* Визуал игры */
    h1 { color: #ff00aa; text-shadow: 0 0 15px #ff00aa; font-size: 18px; margin: 60px 0 10px; }
    #cat-container { width: 220px; height: 280px; margin: 0 auto; position: relative; border: 2px solid #00ffcc; border-radius: 15px; overflow: hidden; animation: neon-glow 4s infinite; background: #000; perspective: 1000px; }
    #cat-img { width: 100%; height: 100%; object-fit: cover; animation: breathe 4s ease-in-out infinite; transition: transform 0.05s; transform-origin: center bottom; }
    
    #coins { font-size: 40px; font-weight: bold; text-shadow: 0 0 20px #00ffcc; margin: 10px 0; color: #fff; }

    .energy-container { width: 85%; margin: 5px auto; text-align: center; }
    #energy-bar { width: 100%; height: 12px; background: #1a1a3a; border-radius: 6px; margin-top: 5px; border: 1px solid #333; overflow: hidden; position: relative; }
    #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff00aa, #00ffcc); transition: width 0.3s; }

    #vpn-banner { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; cursor: pointer; }
    #vpn-img { width: 100%; height: 100%; border-radius: 8px; border: 2px solid #ffff00; }

    #ticket-btn { background: #ffff00; color: #000; width: 85%; padding: 18px; border-radius: 15px; font-weight: bold; border: none; font-size: 18px; box-shadow: 0 0 15px #ffff00; margin: 15px 0 80px; cursor: pointer; }

    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes neon-glow { 0%, 100% { box-shadow: 0 0 15px #ff00aa; } 50% { box-shadow: 0 0 30px #00ffcc; } }
    @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-70px); } }
  </style>
</head>
<body>

  <div id="background-layer"></div>
  <div id="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>

  <div id="side-menu">
    <a href="#">🛠 ЗАДАНИЯ (AD)</a>
    <a href="#">🏆 ЛИДЕРБОРД</a>
    <a href="https://t.me/wallbreaker_community" target="_blank">📢 COMMUNITY</a>
    <a href="#" onclick="toggleMenu()" style="color: #ff00aa; margin-top: 20px;">✖ ЗАКРЫТЬ</a>
  </div>

  <h1>Clearance: <span id="rank-name">Newbie</span></h1>

  <div id="cat-container" onclick="tap(event)">
    <img id="cat-img" src="loading.jpg" alt="Loading...">
  </div>

  <div id="coins">0</div>

  <div class="energy-container">
    <span style="font-size: 12px; color: #555;">DPI BLOCKADE</span>
    <div id="energy-bar"><div id="energy-fill"></div></div>
  </div>

  <div id="vpn-banner" onclick="window.open('https://t.me/hiddifyProxySale_bot', '_blank')">
    <img src="server.jpg" alt="VPN" id="vpn-img">
  </div>

  <button id="ticket-btn">🎟 КЛЮЧ ШИФРОВАНИЯ (2M)</button>

  <script>
    const ranks = [
      { name: "Newbie", mult: 10, img: "cat1.jpg" },
      { name: "Pro", mult: 25, img: "cat2.jpg" },
      { name: "Punk", mult: 60, img: "cat3.jpg" },
      { name: "Agent", mult: 150, img: "cat4.jpg" },
      { name: "CyberGod", mult: 400, img: "cat5.jpg" }
    ];

    let state = {
      coins: parseInt(localStorage.getItem('w_coins')) || 0,
      energy: 100,
      rank: parseInt(localStorage.getItem('w_rank')) || 0
    };

    function toggleMenu() {
      const m = document.getElementById('side-menu');
      m.style.left = m.style.left === '0px' ? '-100%' : '0px';
    }

    // ТА САМАЯ ФУНКЦИЯ — ТЕПЕРЬ ВНУТРИ КОДА
    function updateCatVisual() {
      const currentRank = ranks[state.rank];
      const imgUrl = currentRank.img;

      // 1. Обновляем Кнопку
      const catImg = document.getElementById('cat-img');
      if (catImg.src.indexOf(imgUrl) === -1) {
          catImg.src = imgUrl; 
      }

      // 2. Обновляем Фон синхронно
      const bgLayer = document.getElementById('background-layer');
      bgLayer.style.backgroundImage = `url(${imgUrl})`;
    }

    function updateUI() {
      document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
      document.getElementById('energy-fill').style.width = state.energy + '%';
      document.getElementById('rank-name').innerText = ranks[state.rank].name;
      
      updateCatVisual(); // Вызываем синхронизацию

      localStorage.setItem('w_coins', state.coins);
      localStorage.setItem('w_rank', state.rank);
    }

    function tap(e) {
      if (state.energy <= 0) return;
      state.coins += ranks[state.rank].mult;
      state.energy -= 1;
      
      const img = document.getElementById('cat-img');
      img.style.transform = "translateY(8px) rotateX(-15deg) scale(0.95)"; 
      setTimeout(() => img.style.transform = "scale(1)", 100); 

      showPopup(e.clientX, e.clientY, `+${ranks[state.rank].mult}`);
      updateUI();
    }

    function showPopup(x, y, text) {
      const p = document.createElement('div');
      p.innerText = text;
      p.style.position = 'fixed';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.color = '#fff';
      p.style.fontWeight = 'bold';
      p.style.animation = 'fadeOut 0.8s forwards';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    setInterval(() => { if (state.energy < 100) { state.energy++; updateUI(); } }, 15000);
    updateUI();
  </script>
</body>
</html>
