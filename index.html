<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WallBreaker | Tap to Unblock ⚡</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Adsgram SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="loading-screen">
    <img src="assets/loading.jpg" alt="SYSTEM START...">
  </div>

  <div id="bg-layer" style="display:none;"></div>

  <div id="menu-btn" onclick="toggleMenu()" style="display:none;" aria-label="Open menu">
    <span></span><span></span><span></span>
  </div>

  <div id="sidebar">
    <div class="lang-selector" id="lang-switch">
      <span id="lang-ru" class="active-lang" onclick="setLang('RU')">RU</span>
      <span class="lang-divider">|</span>
      <span id="lang-en" onclick="setLang('EN')">EN</span>
    </div>

    <div class="menu-item ton-buy" id="btn-rank" onclick="openMarket()">
      ROOT INJECTION: 0.5 TON
    </div>

    <div class="menu-item highlight" id="btn-ads" onclick="showAds()">
      ADS INJECTION (+1500)
    </div>

    <div class="menu-item" id="btn-refs" onclick="showRefs()">
      РЕФЕРАЛЫ (10%)
    </div>

    <div class="menu-item" id="btn-top" onclick="showLeaderboard()">
      ЛИДЕРБОРД
    </div>

    <div class="menu-item" id="btn-market" onclick="showRanks()">
      ДАРКНЕТ-МАРКЕТ
    </div>

    <div class="menu-item menu-close" id="btn-close" onclick="toggleMenu()">
      ЗАКРЫТЬ
    </div>
  </div>

  <div id="game-ui" style="display:none;">
    <div id="balance" class="ui-top-block">
      <span id="balance-val">0</span>
      <span id="balance-currency">$WBC</span>
    </div>

    <div id="cat-box" onclick="handleTap()">
      <img id="cat-img" src="assets/cat1.jpg" alt="Breaker">
    </div>

    <div class="energy-container">
      <div class="energy-meta">
        <div id="energy-text">ENERGY</div>
        <div id="energy-value">100 / 100</div>
      </div>

      <div class="energy-bar">
        <div id="energy-fill"></div>
      </div>
    </div>

    <div id="gateway" aria-label="Open subscription bot">
      <img src="assets/server.jpg" alt="Gateway">
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
